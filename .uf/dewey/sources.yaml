# Auto-generated by uf init. Customize as needed.
# This file is user-owned -- uf init will not
# overwrite it after initial creation.

sources:
  # Per-repo disk sources (fine-grained provenance)
  - id: disk-local
    type: disk
    name: website
    config:
      path: "."

  - id: disk-dewey
    type: disk
    name: dewey
    config:
      path: "../dewey"

  - id: disk-gaze
    type: disk
    name: gaze
    config:
      path: "../gaze"

  - id: disk-homebrew-tap
    type: disk
    name: homebrew-tap
    config:
      path: "../homebrew-tap"

  - id: disk-unbound-force
    type: disk
    name: unbound-force
    config:
      path: "../unbound-force"

  # Org-level files (design papers, plans)
  - id: disk-org
    type: disk
    name: org-workspace
    config:
      path: "../"
      recursive: false

  # GitHub API (issues, PRs, READMEs)
  - id: github-unbound-force
    type: github
    name: unbound-force org
    config:
      org: unbound-force
      repos:
        - website
        - dewey
        - gaze
        - homebrew-tap
        - unbound-force
    refresh_interval: daily

  # Web sources (toolstack documentation)
  - id: web-hugo
    type: web
    name: hugo-docs
    config:
      urls:
        - https://gohugo.io/documentation/
      depth: 2
    refresh_interval: weekly

  - id: web-doks
    type: web
    name: doks-theme
    config:
      urls:
        - https://getdoks.org/docs/
      depth: 2
    refresh_interval: weekly

  - id: web-bootstrap
    type: web
    name: bootstrap-css
    config:
      urls:
        - https://getbootstrap.com/docs/5.3/
      depth: 1
    refresh_interval: weekly

  # Core platform documentation (Unbound Force ecosystem)
  - id: web-opencode
    type: web
    name: opencode-docs
    config:
      urls:
        - https://opencode.ai/docs
      depth: 2
    refresh_interval: weekly

  - id: web-mcp-spec
    type: web
    name: mcp-specification
    config:
      urls:
        - https://modelcontextprotocol.io/docs/
      depth: 2
    refresh_interval: weekly
